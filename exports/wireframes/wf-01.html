<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mighty Skill-Bridge — WF-01 Vertical Hero Stack</title>
<style>
  :root { --c-bg:#0D0E15;--c-surface:#161824;--c-text:#F1F5FF;--c-text-sub:#C5CAE0;
          --c-accent:#00F0FF;--c-success:#39FF14;--c-danger:#FF3366;--c-border:#2A2D3E;
          --r-md:12px;--s-3:16px;--s-4:24px;--fs-h1:32px;--fs-body:16px; }
  body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:"Yu Gothic UI",sans-serif}
  .wf01{max-width:480px;margin:0 auto;padding:var(--s-3)}
  .wf01 h2{font-size:var(--fs-h1)}
  .wf01__topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-3)}
  .wf01__topbar h1{font-size:18px;margin:0;color:var(--c-accent)}
  .wf01__hero{padding:var(--s-3) 0;border-bottom:1px solid var(--c-border);margin-bottom:var(--s-3)}
  .wf01__hero p{color:var(--c-text-sub)}
  textarea{width:100%;background:var(--c-surface);color:var(--c-text);
           border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--s-3);box-sizing:border-box;font:inherit}
  .wf01__step{margin-bottom:var(--s-3)}
  .wf01__step h3{font-size:18px;color:var(--c-text-sub);margin-bottom:8px}
  .wf01__step-actions{display:flex;gap:8px;margin-top:8px}
  .wf01__step-actions .btn,.wf01__step-actions button{background:transparent;color:var(--c-accent);
    border:1px solid var(--c-accent);border-radius:8px;padding:6px 12px;cursor:pointer;font:inherit}
  .wf01__cta{width:100%;padding:var(--s-3) var(--s-4);background:var(--c-accent);
             color:var(--c-bg);border:0;border-radius:var(--r-md);font-size:22px;font-weight:700;margin-top:var(--s-3);cursor:pointer}
  .wf01__cta[aria-busy="true"]{opacity:.5;cursor:progress}
  .wf01__cta:disabled{opacity:.4}
  .wf01__result[hidden]{display:none}
  .wf01__result{margin-top:var(--s-4);padding:var(--s-3);background:var(--c-surface);border-radius:var(--r-md)}
  .wf01__gauge{font-size:64px;font-weight:800;color:var(--c-accent);text-align:center}
  details{margin:var(--s-3) 0;background:var(--c-bg);padding:var(--s-3);border-radius:var(--r-md);border:1px solid var(--c-border)}
  summary{cursor:pointer;color:var(--c-text-sub)}
  .wf01__is-stale{opacity:.4}
</style></head><body>
<main class="wf01">
  <header class="wf01__topbar"><strong>≡</strong><h1>Mighty Skill-Bridge</h1><span>⚙</span></header>
  <section class="wf01__hero"><h2>AI で一瞬にフィット診断</h2><p>経歴と案件を貼るだけ</p></section>
  <section class="wf01__step">
    <h3>Step 1 — 経歴書</h3>
    <textarea id="engineer" rows="8" aria-label="engineer profile" placeholder="経歴を貼り付け..."></textarea>
    <div class="wf01__step-actions">
      <button type="button" data-act="load-sample-engineer">✏ Load Sample</button>
    </div>
  </section>
  <section class="wf01__step">
    <h3>Step 2 — 案件票</h3>
    <textarea id="job" rows="8" aria-label="job description" placeholder="案件を貼り付け..."></textarea>
    <div class="wf01__step-actions">
      <button type="button" data-act="load-sample-job">✏ Load Sample</button>
    </div>
  </section>
  <button class="wf01__cta" id="analyze">⚡ Analyze Fit</button>
  <section class="wf01__result" id="result" aria-live="polite" hidden></section>
</main>
<script>
const $ = (s) => document.querySelector(s);
const SAMPLE_ENG = "山田太郎\n経験: 8年\nPython / Django / AWS (EC2/Lambda/S3) / Docker / Kubernetes\n大手 SIer → 自社 SaaS チームリード\n直近 PJ: 月間 5M req の検索基盤刷新";
const SAMPLE_JOB = "案件: 株式会社X SRE\n必須: Python 3+, AWS, Kubernetes\n歓迎: Terraform, Datadog\nリモート週3, 単価 90-120万";
document.querySelector('[data-act="load-sample-engineer"]').addEventListener("click",()=>{$("#engineer").value=SAMPLE_ENG; staleResult();});
document.querySelector('[data-act="load-sample-job"]').addEventListener("click",()=>{$("#job").value=SAMPLE_JOB; staleResult();});
function staleResult(){const r=$("#result"); if(!r.hidden) r.classList.add("wf01__is-stale");}
["engineer","job"].forEach(id=>$("#"+id).addEventListener("input",staleResult));
async function parseDoc(text, doc_type) {
  const fd = new FormData(); fd.append("text", text); fd.append("doc_type", doc_type);
  const r = await fetch("/api/parse", {method:"POST", body: fd});
  if (!r.ok) throw new Error("parse "+doc_type+" failed");
  return r.json();
}
async function match(eng, job) {
  const r = await fetch("/api/match", {method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({engineer_content: eng, job_content: job})});
  if (!r.ok) throw new Error("match failed");
  return r.json();
}
$("#analyze").addEventListener("click", async (ev) => {
  const cta = ev.currentTarget; cta.setAttribute("aria-busy","true"); cta.disabled = true;
  try {
    const eng = $("#engineer").value.trim(), job = $("#job").value.trim();
    if (!eng || !job) throw new Error("両方の入力が必要です");
    const [p1, p2] = await Promise.all([parseDoc(eng,"engineer"), parseDoc(job,"job")]);
    const m = await match(p1.parsed_text || eng, p2.parsed_text || job);
    const res = $("#result"); res.hidden = false; res.classList.remove("wf01__is-stale");
    const qa = (m.qa||[]).map(q=>`<details><summary>${q.question}</summary><p>${q.answer}</p><p><em>Tip: ${q.tip}</em></p></details>`).join("");
    res.innerHTML = `<div class="wf01__gauge">${m.final_score} / 100</div>
      <pre style="background:#0a0b12;padding:12px;border-radius:8px;overflow:auto">${JSON.stringify(m.scores,null,2)}</pre>
      <article><p>${m.summary||""}</p></article>
      <h3>推奨質問</h3>${qa}
      <h3>Roadmap</h3><p>Week 1: ${m.roadmap_week1||""}</p>
      <p>Week 2: ${m.roadmap_week2||""}</p><p>Week 3: ${m.roadmap_week3||""}</p>`;
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    res.scrollIntoView({behavior: reduce?"auto":"smooth", block:"start"});
  } catch (e) { alert(e.message); }
  finally { cta.removeAttribute("aria-busy"); cta.disabled = false; cta.textContent="⚡ Re-analyze"; }
});
</script></body></html>
