<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mighty Skill-Bridge — WF-02 Split Form</title>
<style>
:root{--c-bg:#0D0E15;--c-surface:#161824;--c-text:#F1F5FF;--c-text-sub:#C5CAE0;
      --c-accent:#00F0FF;--c-border:#2A2D3E;--r-md:12px;--r-lg:20px;
      --s-3:16px;--s-4:24px;--s-5:40px;--fs-h2:22px}
body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:"Yu Gothic UI",sans-serif}
.wf02{display:grid;gap:var(--s-4);max-width:1280px;margin:0 auto;padding:var(--s-4)}
.wf02 header{display:flex;justify-content:space-between;align-items:center}
.wf02 h1{color:var(--c-accent);margin:0}
.wf02 nav a{color:var(--c-text-sub);text-decoration:none;margin-left:var(--s-3)}
.wf02__grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4)}
@media (max-width:900px){.wf02__grid{grid-template-columns:1fr}}
.wf02__col h2{font-size:var(--fs-h2);color:var(--c-text-sub);margin:0 0 var(--s-3)}
textarea{width:100%;box-sizing:border-box;background:var(--c-surface);color:var(--c-text);
         border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--s-3);min-height:340px;font:inherit}
.wf02__col-actions{margin-top:8px;display:flex;gap:8px}
.wf02__col-actions button{background:transparent;color:var(--c-accent);border:1px solid var(--c-accent);
                          border-radius:8px;padding:6px 12px;cursor:pointer;font:inherit}
.wf02__cta{justify-self:center;padding:var(--s-3) var(--s-5);background:var(--c-accent);
           color:var(--c-bg);border:0;border-radius:var(--r-lg);font-size:var(--fs-h2);font-weight:700;cursor:pointer}
.wf02__cta:disabled{opacity:.4;cursor:not-allowed}
.wf02__cta[aria-busy="true"]{opacity:.5;cursor:progress}
.wf02__result[hidden]{display:none}
.wf02__result{display:grid;grid-template-columns:360px 1fr;gap:var(--s-4);
              background:var(--c-surface);padding:var(--s-4);border-radius:var(--r-lg)}
@media (max-width:900px){.wf02__result{grid-template-columns:1fr}}
.wf02__gauge{font-size:96px;color:var(--c-accent);text-align:center;font-weight:800;line-height:1}
details{margin:8px 0;padding:8px;background:#0a0b12;border-radius:8px;border:1px solid var(--c-border)}
summary{cursor:pointer;color:var(--c-text-sub)}
</style></head><body>
<main class="wf02">
  <header><h1>Mighty Skill-Bridge</h1><nav><a href="../../">Admin</a></nav></header>
  <div class="wf02__grid">
    <section class="wf02__col"><h2>経歴書</h2>
      <textarea id="engineer" placeholder="経歴を貼り付け..."></textarea>
      <div class="wf02__col-actions"><button data-sample="engineer">Load Sample</button></div></section>
    <section class="wf02__col"><h2>案件票</h2>
      <textarea id="job" placeholder="案件を貼り付け..."></textarea>
      <div class="wf02__col-actions"><button data-sample="job">Load Sample</button></div></section>
  </div>
  <button class="wf02__cta" id="analyze" disabled>⚡ Analyze Fit</button>
  <section class="wf02__result" id="result" aria-live="polite" hidden></section>
</main>
<script src="_mock.js"></script>
<script>
const $=(s)=>document.querySelector(s);
const SAMPLES={engineer:"山田太郎 / 経験 8 年 / Python・AWS・Kubernetes / 月 5M req の検索基盤刷新リード",
               job:"株式会社X SRE / Python+AWS+K8s 必須 / 単価 90-120 万 / リモート週3"};
document.querySelectorAll("[data-sample]").forEach(b=>b.addEventListener("click",()=>{
  $("#"+b.dataset.sample).value=SAMPLES[b.dataset.sample]; syncCta();}));
function syncCta(){$("#analyze").disabled = !($("#engineer").value.trim() && $("#job").value.trim())}
["engineer","job"].forEach(id=>$("#"+id).addEventListener("input",syncCta));
async function parseDoc(text, t){const fd=new FormData();fd.append("text",text);fd.append("doc_type",t);
  const r=await fetch("/api/parse",{method:"POST",body:fd}); return r.json()}
async function match(e,j){const r=await fetch("/api/match",{method:"POST",
  headers:{"content-type":"application/json"},
  body:JSON.stringify({engineer_content:e,job_content:j})}); return r.json()}
$("#analyze").addEventListener("click",async ev=>{
  const cta=ev.currentTarget; cta.setAttribute("aria-busy","true"); cta.disabled=true;
  const eng=$("#engineer"),job=$("#job"); eng.readOnly=true; job.readOnly=true;
  try{const [p1,p2]=await Promise.all([parseDoc(eng.value,"engineer"),parseDoc(job.value,"job")]);
    const m=await match(p1.parsed_text||eng.value,p2.parsed_text||job.value);
    const r=$("#result"); r.hidden=false;
    const qa=(m.qa||[]).map(q=>`<details><summary>${q.question}</summary><p>${q.answer}</p></details>`).join("");
    r.innerHTML=`<div><div class="wf02__gauge">${m.final_score}</div>
      <pre style="background:#0a0b12;padding:12px;border-radius:8px">${JSON.stringify(m.scores,null,2)}</pre></div>
      <div><p>${m.summary||""}</p>${qa}
        <p>Week1: ${m.roadmap_week1||""}</p><p>Week2: ${m.roadmap_week2||""}</p><p>Week3: ${m.roadmap_week3||""}</p></div>`;
  }catch(e){alert("分析失敗: "+e.message)}
  finally{cta.removeAttribute("aria-busy");cta.disabled=false;eng.readOnly=false;job.readOnly=false;}});
</script></body></html>
