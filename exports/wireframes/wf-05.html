<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mighty Skill-Bridge — WF-05 DnD 4-Quadrant Workspace</title>
<style>
:root{--c-bg:#0D0E15;--c-surface:#161824;--c-text:#F1F5FF;--c-text-sub:#C5CAE0;
      --c-accent:#00F0FF;--c-success:#39FF14;--c-danger:#FF3366;--c-border:#2A2D3E;
      --r-md:12px;--r-lg:20px;--s-2:8px;--s-3:16px}
body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:"Yu Gothic UI",sans-serif}
.wf05__quadrants{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
                 gap:var(--s-3);padding:var(--s-3);height:100vh;box-sizing:border-box}
@media (max-width:900px){.wf05__quadrants{grid-template-columns:1fr;grid-template-rows:repeat(4,minmax(220px,auto));height:auto}}
.wf05__zone{background:var(--c-surface);border:1px solid var(--c-border);
            border-radius:var(--r-lg);padding:var(--s-3);overflow-y:auto;display:flex;flex-direction:column}
.wf05__zone h2{margin:0 0 var(--s-3);font-size:18px;color:var(--c-text-sub)}
.wf05__zone.is-over{border-color:var(--c-accent);box-shadow:inset 0 0 0 2px var(--c-accent)}
.wf05__cards{list-style:none;padding:0;margin:0;flex:1}
.wf05__cards li{background:var(--c-bg);border:1px solid var(--c-border);
                padding:var(--s-2) var(--s-3);border-radius:var(--r-md);margin-bottom:var(--s-2);cursor:grab}
.wf05__cards li.is-dragging{opacity:.4;cursor:grabbing}
button{background:var(--c-accent);color:var(--c-bg);border:0;border-radius:var(--r-md);
       padding:var(--s-2) var(--s-3);font-weight:700;cursor:pointer;margin-top:var(--s-2)}
.wf05__hint{color:var(--c-text-sub);font-size:13px;margin:0 0 var(--s-2)}
canvas{width:100%;height:160px;background:#0a0b12;border-radius:8px;margin-top:var(--s-2)}
</style></head><body>
<main class="wf05__quadrants">
  <section class="wf05__zone" data-zone="engineers"><h2>Engineers</h2>
    <ul class="wf05__cards" id="z-engineers"></ul>
    <button data-add="engineer">+ Add Engineer</button></section>
  <section class="wf05__zone" data-zone="jobs"><h2>Jobs</h2>
    <ul class="wf05__cards" id="z-jobs"></ul>
    <button data-add="job">+ Add Job</button></section>
  <section class="wf05__zone wf05__zone--drop" data-zone="matches"><h2>Matches (drop both)</h2>
    <p class="wf05__hint">経歴 + 案件カードをここに drop → 自動分析</p>
    <ul class="wf05__cards" id="z-matches"></ul></section>
  <section class="wf05__zone" data-zone="reports"><h2>Reports</h2>
    <p class="wf05__hint">Match score 分布</p>
    <canvas id="chart" width="320" height="160"></canvas></section>
</main>
<script>
const state={engineers:[],jobs:[],matches:[],pending:[]};
function renderCards(){["engineers","jobs"].forEach(k=>{
  const ul=document.getElementById("z-"+k); ul.innerHTML="";
  state[k].forEach((it,i)=>{
    const li=document.createElement("li"); li.draggable=true;
    li.dataset.kind=k.slice(0,-1); li.dataset.idx=i;
    li.textContent=it.label;
    li.addEventListener("dragstart",e=>{
      e.dataTransfer.setData("text/plain",JSON.stringify({k:li.dataset.kind,i:+li.dataset.idx}));
      li.classList.add("is-dragging");});
    li.addEventListener("dragend",()=>li.classList.remove("is-dragging"));
    ul.appendChild(li);});});
  const mu=document.getElementById("z-matches"); mu.innerHTML="";
  state.matches.forEach(m=>{const li=document.createElement("li");
    li.textContent=m.label+" = "+m.score; mu.appendChild(li);});}
function drawChart(){const cv=document.getElementById("chart"),c=cv.getContext("2d");
  cv.width=cv.clientWidth; c.clearRect(0,0,cv.width,160); c.fillStyle="#00F0FF";
  state.matches.forEach((m,i)=>{const h=(m.score/100)*150; c.fillRect(i*24+10,160-h,20,h);});}
document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",async()=>{
  const t=prompt(b.dataset.add+" のテキストを貼り付け"); if(!t) return;
  const fd=new FormData(); fd.append("text",t); fd.append("doc_type",b.dataset.add);
  try{await fetch("/api/parse",{method:"POST",body:fd});}catch(e){console.warn(e);}
  const arr = b.dataset.add==="engineer" ? state.engineers : state.jobs;
  arr.push({label:t.slice(0,28)+(t.length>28?"…":""),text:t});
  renderCards();}));
const drop=document.querySelector('[data-zone="matches"]');
drop.addEventListener("dragover",e=>{e.preventDefault(); drop.classList.add("is-over")});
drop.addEventListener("dragleave",()=>drop.classList.remove("is-over"));
drop.addEventListener("drop",async e=>{e.preventDefault(); drop.classList.remove("is-over");
  const d=JSON.parse(e.dataTransfer.getData("text/plain")); state.pending.push(d);
  if(state.pending.length>=2){
    const eng=state.pending.find(x=>x.k==="engineer");
    const job=state.pending.find(x=>x.k==="job");
    state.pending=[];
    if(!eng||!job){alert("engineer + job 各 1 枚必要"); return;}
    const engT=state.engineers[eng.i].text, jobT=state.jobs[job.i].text;
    try{
      const m=await (await fetch("/api/match",{method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({engineer_content:engT,job_content:jobT})})).json();
      state.matches.push({score:m.final_score,
        label:`${state.engineers[eng.i].label} × ${state.jobs[job.i].label}`});
      renderCards(); drawChart();
    }catch(err){alert("分析失敗: "+err.message);}}});
window.addEventListener("resize",drawChart);
</script></body></html>
