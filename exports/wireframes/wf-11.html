<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mighty Skill-Bridge — WF-11 Voice Interview</title>
<style>
:root{--c-bg:#0D0E15;--c-surface:#161824;--c-text:#F1F5FF;--c-text-sub:#C5CAE0;
      --c-accent:#00F0FF;--c-success:#39FF14;--c-danger:#FF3366;--c-border:#2A2D3E;
      --r-md:12px;--r-lg:20px;--s-3:16px;--s-4:24px}
body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:"Yu Gothic UI",sans-serif;
     min-height:100dvh;display:flex;flex-direction:column}
header{padding:var(--s-3);border-bottom:1px solid var(--c-border);display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:18px;color:var(--c-accent)}
.wf11{flex:1;display:grid;grid-template-rows:auto 1fr auto;padding:var(--s-3);max-width:840px;margin:0 auto;width:100%;gap:var(--s-3)}
.transcript{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:var(--s-3);
            overflow-y:auto;min-height:240px;display:flex;flex-direction:column;gap:12px}
.line{padding:10px 14px;border-radius:14px;max-width:80%}
.line.ai{background:#0a0b12;border:1px solid var(--c-border);align-self:flex-start}
.line.you{background:var(--c-accent);color:var(--c-bg);align-self:flex-end;font-weight:600}
.line .role{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:4px}
.controls{display:flex;flex-direction:column;align-items:center;gap:12px;padding:var(--s-3) 0}
.mic{width:96px;height:96px;border-radius:50%;background:var(--c-danger);color:#fff;border:0;cursor:pointer;
     font-size:36px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 0 rgba(255,51,102,.6);
     transition:transform .15s,box-shadow .15s}
.mic.is-recording{background:var(--c-accent);color:var(--c-bg);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,240,255,.6)}70%{box-shadow:0 0 0 24px rgba(0,240,255,0)}100%{box-shadow:0 0 0 0 rgba(0,240,255,0)}}
.status{color:var(--c-text-sub);font-size:14px}
.fallback{display:flex;gap:8px;width:100%}
.fallback input{flex:1;background:#0a0b12;color:var(--c-text);border:1px solid var(--c-border);border-radius:var(--r-md);padding:12px;font:inherit}
.fallback button{background:var(--c-accent);color:var(--c-bg);border:0;border-radius:var(--r-md);padding:0 20px;font-weight:700;cursor:pointer}
.result{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-md);padding:var(--s-3);display:none}
.result.is-open{display:block}
.result h3{margin:0 0 8px;color:var(--c-accent)}
.score{font-size:48px;font-weight:800;color:var(--c-accent);text-align:center}
</style></head><body>
<script src="_mock.js"></script>
<header><h1>WF-11 Voice Interview</h1><span style="color:var(--c-text-sub);font-size:13px">🎙 音声で AI 面接</span></header>
<main class="wf11">
  <section class="transcript" id="trans" aria-live="polite"></section>
  <div class="controls">
    <button class="mic" id="mic" aria-label="話す" title="話す">🎙</button>
    <div class="status" id="status">マイクボタンを押して話してください</div>
    <div class="fallback"><input id="text" placeholder="マイクが使えない場合: テキスト入力">
      <button id="send">送信</button></div>
  </div>
  <section class="result" id="result"><h3>Fit 結果</h3>
    <div class="score" id="score">--</div>
    <p id="summary"></p></section>
</main>
<script>
const state={step:"engineer", engineer:"", job:""};
const $=s=>document.querySelector(s);
function push(role, text){
  const li=document.createElement("div"); li.className="line "+role;
  li.innerHTML=`<div class="role">${role==="ai"?"AI":"YOU"}</div>${text}`;
  $("#trans").appendChild(li); $("#trans").scrollTop=1e9;
}
push("ai", "こんにちは、Mighty AI 面接官です。まず経歴を 30 秒以内で話してください。");
async function process(text){
  push("you", text); $("#status").textContent="処理中…";
  if(state.step==="engineer"){state.engineer=text;
    const fd=new FormData();fd.append("text",text);fd.append("doc_type","engineer");
    await fetch("/api/parse",{method:"POST",body:fd});
    push("ai","ありがとうございます。次に応募案件を話してください。"); state.step="job";
    $("#status").textContent="次の発話を待っています";return;}
  if(state.step==="job"){state.job=text;
    const fd=new FormData();fd.append("text",text);fd.append("doc_type","job");
    await fetch("/api/parse",{method:"POST",body:fd});
    push("ai","分析しています…");
    const m=await (await fetch("/api/match",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({engineer_content:state.engineer,job_content:state.job})})).json();
    $("#score").textContent=m.final_score+" / 100";
    $("#summary").textContent=m.summary||"";
    $("#result").classList.add("is-open"); state.step="done";
    push("ai",`Fit スコア ${m.final_score}/100 で結果を表示しました。`);
    $("#status").textContent="完了";return;}
}
$("#send").addEventListener("click",()=>{const t=$("#text").value.trim(); if(t){$("#text").value=""; process(t);}});
$("#text").addEventListener("keydown",e=>{if(e.key==="Enter"){$("#send").click();}});
const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!Rec){$("#status").textContent="(Web Speech API 非対応ブラウザ。下のテキスト入力で代替できます)";}
else{
  const rec=new Rec(); rec.lang="ja-JP"; rec.interimResults=false;
  rec.onresult = e => {const t=e.results[0][0].transcript; process(t);};
  rec.onerror = e => {$("#status").textContent="音声エラー: "+e.error;};
  rec.onend = () => {$("#mic").classList.remove("is-recording");};
  $("#mic").addEventListener("click",()=>{
    if($("#mic").classList.contains("is-recording")){rec.stop();}
    else{$("#mic").classList.add("is-recording"); $("#status").textContent="🔴 録音中…"; rec.start();}
  });
}
</script></body></html>
